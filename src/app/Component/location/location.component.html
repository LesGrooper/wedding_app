<section class="section text-center">
  <!-- "bells on the hill" — lonceng pernikahan di bukit tempat acara -->
  <app-ambient-hill-bells />
  <p class="font-script text-3xl text-rose-dark mb-2" appReveal>Lokasi Acara</p>
  <div class="w-16 h-px bg-gold mx-auto mb-6" appReveal></div>

  <h3 class="font-serif text-2xl text-ink mb-1" appReveal>{{ name }}</h3>
  <p class="text-sm text-muted mb-8" appReveal>{{ address }}</p>

  <div class="overflow-hidden rounded-2xl border border-gold/40 shadow-soft mb-6" appReveal>
    <iframe
      [src]="embedUrl | safeUrl"
      width="100%"
      height="320"
      style="border:0"
      loading="lazy"
      referrerpolicy="no-referrer-when-downgrade"
      title="Lokasi Acara"
    ></iframe>
  </div>

  <a [href]="openUrl" target="_blank" rel="noopener noreferrer" class="btn-outline" appReveal>
    Buka di Google Maps
  </a>
</section>
