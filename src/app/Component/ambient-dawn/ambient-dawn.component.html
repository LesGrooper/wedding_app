<div class="layer" aria-hidden="true">
  <span class="ray ray-1"></span>
  <span class="ray ray-2"></span>
  <span class="ray ray-3"></span>

  @for (d of dews; track $index) {
    <svg
      class="dew"
      viewBox="-12 -12 24 24"
      [style.left.%]="d.left"
      [style.top.%]="d.top"
      [style.width.px]="d.size"
      [style.height.px]="d.size"
      [style.animation-delay.s]="d.delay"
    >
      <path d="M0,-12 C1.5,-3 3,-1.5 12,0 C3,1.5 1.5,3 0,12 C-1.5,3 -3,1.5 -12,0 C-3,-1.5 -1.5,-3 0,-12 Z" />
    </svg>
  }
</div>
