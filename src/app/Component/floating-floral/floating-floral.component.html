<div
  class="absolute pointer-events-none animate-wiggle"
  [class.top-0]="position.includes('top')"
  [class.bottom-0]="position.includes('bottom')"
  [class.left-0]="position.includes('left')"
  [class.right-0]="position.includes('right')"
  [style.width.px]="size"
  [style.height.px]="size"
  aria-hidden="true"
>
  <svg viewBox="0 0 100 100" class="w-full h-full" fill="none" stroke="currentColor" stroke-width="1.2"
    [style.color]="color">
    <circle cx="50" cy="35" r="10"/>
    <circle cx="35" cy="55" r="10"/>
    <circle cx="65" cy="55" r="10"/>
    <circle cx="50" cy="75" r="10"/>
    <circle cx="50" cy="55" r="5" fill="currentColor"/>
    <path d="M50 85 Q 50 95 45 100" />
  </svg>
</div>
