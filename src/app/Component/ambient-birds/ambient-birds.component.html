@if (mode === 'fly') {
  <!-- Lane selebar section; translateX % lane = % lebar section -->
  <div class="lane lane-1" aria-hidden="true">
    <svg class="bird" viewBox="0 0 32 20">
      <path d="M2,12 Q8,4 15,10" />
      <path d="M15,10 Q22,4 30,10" />
    </svg>
  </div>
  <div class="lane lane-2" aria-hidden="true">
    <svg class="bird bird-small" viewBox="0 0 32 20">
      <path d="M2,12 Q8,4 15,10" />
      <path d="M15,10 Q22,4 30,10" />
    </svg>
  </div>
} @else {
  <div class="perch" aria-hidden="true">
    <svg class="spark" viewBox="-12 -12 24 24">
      <path d="M0,-12 C1.5,-3 3,-1.5 12,0 C3,1.5 1.5,3 0,12 C-1.5,3 -3,1.5 -12,0 C-3,-1.5 -1.5,-3 0,-12 Z" fill="#E8D4A0" />
    </svg>
    <svg class="sitting" viewBox="0 0 40 26">
      <!-- dua burung hinggap berdampingan, saling menghadap -->
      <g fill="#B8848F" opacity="0.75">
        <ellipse cx="13" cy="16" rx="6" ry="4.5" />
        <circle cx="18" cy="11" r="3" />
        <path d="M7,17 L1,20 L8,20 Z" />
      </g>
      <g fill="#D8A7B1" opacity="0.85">
        <ellipse cx="28" cy="16" rx="5.5" ry="4" />
        <circle cx="23.5" cy="11.5" r="2.7" />
        <path d="M34,17 L39,20 L33,20 Z" />
      </g>
      <line x1="0" y1="21" x2="40" y2="21" stroke="#D4AF37" stroke-width="1" opacity="0.7" />
    </svg>
  </div>
}
