<svg class="vine" viewBox="0 0 100 140" preserveAspectRatio="none" aria-hidden="true">
  <!-- Sulur: mulai dari tengah-atas, mengelilingi form searah jarum jam.
       pathLength=100 menyamakan dasharray berapa pun ukuran render;
       vector-effect menjaga tebal garis saat viewBox direntangkan. -->
  <path
    class="stem"
    d="M 50,2 H 90 Q 98,2 98,8 V 132 Q 98,138 90,138 H 10 Q 2,138 2,132 V 8 Q 2,2 10,2 H 50"
    pathLength="100"
    fill="none"
    stroke="#D8A7B1"
    stroke-width="1.6"
    stroke-linecap="round"
    vector-effect="non-scaling-stroke"
  />
</svg>
