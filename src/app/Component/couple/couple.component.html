<section class="section text-center">
  <!-- "till there was you" — sepasang mawar mekar saat section terlihat -->
  <app-ambient-roses />
  <p class="font-script text-3xl text-rose-dark mb-2" appReveal>{{ trans('couple_title') }}</p>
  <div class="w-16 h-px bg-gold mx-auto mb-12" appReveal></div>

  <div class="grid grid-cols-1 @md:grid-cols-2 gap-12">
    <div appReveal="left" [revealDelay]="100">
      <div class="relative mx-auto w-44 h-44 @md:w-56 @md:h-56 rounded-full overflow-hidden border-2 border-gold/50 shadow-soft mb-4">
        <img [src]="groom.photo" alt="" class="w-full h-full object-cover" loading="lazy" />
      </div>
      <h3 class="font-serif text-2xl @md:text-3xl text-ink mb-1">{{ groom.name }}</h3>
      <p class="text-sm text-muted leading-relaxed whitespace-pre-line">{{ trans('couple_groom_parents', groom.father, groom.mother) }}</p>
    </div>

    <div appReveal="right" [revealDelay]="200">
      <div class="relative mx-auto w-44 h-44 @md:w-56 @md:h-56 rounded-full overflow-hidden border-2 border-gold/50 shadow-soft mb-4">
        <img [src]="bride.photo" alt="" class="w-full h-full object-cover" loading="lazy" />
      </div>
      <h3 class="font-serif text-2xl @md:text-3xl text-ink mb-1">{{ bride.name }}</h3>
      <p class="text-sm text-muted leading-relaxed whitespace-pre-line">{{ trans('couple_bride_parents', bride.father, bride.mother) }}</p>
    </div>
  </div>
</section>
