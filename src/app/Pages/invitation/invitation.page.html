}

<!-- Floating background-music toggle. Appears once the splash is dismissed. -->
@if (!splashOpen()) {
  <button
    type="button"
    (click)="toggleMute()"
    class="bgm-btn fixed bottom-5 right-5 z-[9999] flex h-12 w-12 items-center justify-center rounded-full bg-rose text-white border border-gold/40 shadow-soft transition hover:bg-rose-dark"
    [attr.aria-label]="muted() ? 'Nyalakan musik' : 'Matikan musik'"
    [attr.aria-pressed]="muted()"
  >
    <svg
      viewBox="0 0 24 24"
      class="h-5 w-5"
      [class.animate-wiggle]="!muted()"
      fill="none"
      stroke="currentColor"
      stroke-width="1.8"
      stroke-linecap="round"
      stroke-linejoin="round"
      aria-hidden="true"
    >
      <!-- Music note (always shown) -->
      <path d="M9 18V5l10-2v13" />
      <circle cx="6" cy="18" r="3" />
      <circle cx="16" cy="16" r="3" />
      <!-- Slash across the note when muted -->
      @if (muted()) {
        <line x1="3" y1="3" x2="21" y2="21" stroke-width="2" />
      }
    </svg>
  </button>
}

<!--
  Background music. Plays on splash dismissal (onOpen) — that click is the
  user gesture browsers require for autoplay. Missing file fails silently.
-->
<audio #bgm loop preload="auto">
  <source src="assets/audio/bgm.mp3" type="audio/mpeg" />
</audio>

<main class="invite-col @container relative bg-ivory min-h-screen overflow-x-hidden">
  <app-parallax-bg src="assets/svg/divider-floral.svg" [speed]="0.2" />

  <!-- Page-wide ambient petals (above the bg, below content & UI). -->
  <div class="petals-layer pointer-events-none fixed inset-0 z-[1]">
    <app-falling-petals [count]="8" />
  </div>

  <app-hero
    [groom]="env.groom.name"
    [bride]="env.bride.name"
    [formattedDate]="env.eventDate | formatDate: 'EEEE, d MMMM yyyy'"
    [guestName]="(guestService.currentGuest$ | async)?.name || 'Tamu Undangan'"
  />

  <app-couple [groom]="env.groom" [bride]="env.bride" />

  <app-countdown
    [eventDate]="env.eventDate"
    [akadTime]="env.events.akadTime"
    [receptionTime]="env.events.receptionTime"
  />

  <app-story />

  <app-gallery />

  <app-location
    [name]="env.venue.name"
    [address]="env.venue.address"
    [embedUrl]="env.venue.mapsEmbedUrl"
    [openUrl]="env.venue.mapsOpenUrl"
  />

  <app-rsvp-form />

  <app-gift [accounts]="env.gift" />

  <app-greetings-wall />

  <footer class="relative text-center pt-10 pb-20 text-xs text-muted">
    <p class="max-w-md mx-auto mb-6 px-6 text-sm leading-relaxed">{{ trans('footer_closing') }}</p>
    <p class="font-script text-xl text-rose-dark mb-1">{{ trans('footer_thank_you') }}</p>
    <p>{{ trans('footer_thanks_body') }}</p>
    <!-- reprise: sepasang burung hinggap berdampingan + satu kerlip -->
    <app-ambient-birds mode="perch" />
  </footer>
</main>
