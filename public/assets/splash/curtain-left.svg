<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 1000" preserveAspectRatio="none" fill="none">
  <!--
    Tirai kiri v3 — ivory linen, referensi foto pinch-pleat:
    * palet: ivory #FFFDFB / warm cream #F7F2EC / soft white #FFFEFD,
      aksen champagne #E8D4A0, trim antique gold #D4AF37, dusty rose #D8A7B1
      (+ turunan cream lebih dalam utk crease agar lipatan tetap terbaca)
    * rel emas + ring di atas, kerutan pinch-pleat di header
    * pita lattice dusty-rose di tepi dalam (leading edge) seperti foto
    * tekstur serat linen + grain anti-banding via feTurbulence
    Seam/tepi dalam ada di KANAN (x=500).
  -->
  <defs>
    <!-- Lipatan: crease cream dalam -> naik -> puncak soft-white sempit -> cream -->
    <linearGradient id="cl-pleats" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0.000" stop-color="#E0D2BE"/>
      <stop offset="0.027" stop-color="#F3ECE1"/>
      <stop offset="0.040" stop-color="#FFFEFD"/>
      <stop offset="0.058" stop-color="#F7F2EC"/>
      <stop offset="0.090" stop-color="#E0D2BE"/>
      <stop offset="0.122" stop-color="#F3ECE1"/>
      <stop offset="0.136" stop-color="#FFFEFD"/>
      <stop offset="0.157" stop-color="#F7F2EC"/>
      <stop offset="0.195" stop-color="#E0D2BE"/>
      <stop offset="0.224" stop-color="#F3ECE1"/>
      <stop offset="0.237" stop-color="#FFFEFD"/>
      <stop offset="0.256" stop-color="#F7F2EC"/>
      <stop offset="0.290" stop-color="#E0D2BE"/>
      <stop offset="0.323" stop-color="#F3ECE1"/>
      <stop offset="0.338" stop-color="#FFFEFD"/>
      <stop offset="0.360" stop-color="#F7F2EC"/>
      <stop offset="0.400" stop-color="#E0D2BE"/>
      <stop offset="0.430" stop-color="#F3ECE1"/>
      <stop offset="0.444" stop-color="#FFFEFD"/>
      <stop offset="0.464" stop-color="#F7F2EC"/>
      <stop offset="0.500" stop-color="#E0D2BE"/>
      <stop offset="0.527" stop-color="#F3ECE1"/>
      <stop offset="0.540" stop-color="#FFFEFD"/>
      <stop offset="0.558" stop-color="#F7F2EC"/>
      <stop offset="0.590" stop-color="#E0D2BE"/>
      <stop offset="0.622" stop-color="#F3ECE1"/>
      <stop offset="0.636" stop-color="#FFFEFD"/>
      <stop offset="0.657" stop-color="#F7F2EC"/>
      <stop offset="0.695" stop-color="#E0D2BE"/>
      <stop offset="0.725" stop-color="#F3ECE1"/>
      <stop offset="0.739" stop-color="#FFFEFD"/>
      <stop offset="0.759" stop-color="#F7F2EC"/>
      <stop offset="0.795" stop-color="#E0D2BE"/>
      <stop offset="0.824" stop-color="#F3ECE1"/>
      <stop offset="0.837" stop-color="#FFFEFD"/>
      <stop offset="0.856" stop-color="#F7F2EC"/>
      <stop offset="0.890" stop-color="#E0D2BE"/>
      <!-- lipatan terakhir menggumpal ke arah trim -->
      <stop offset="0.923" stop-color="#F0E7D8"/>
      <stop offset="0.938" stop-color="#FBF7F1"/>
      <stop offset="0.960" stop-color="#EADDC9"/>
      <stop offset="1.000" stop-color="#D9C9B2"/>
    </linearGradient>

    <!-- Cahaya lembut dari atas, bayangan hangat menumpuk di hem -->
    <linearGradient id="cl-vsheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.00" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="0.15" stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="0.45" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="0.80" stop-color="#C4B098" stop-opacity="0.10"/>
      <stop offset="0.96" stop-color="#B49E82" stop-opacity="0.18"/>
      <stop offset="1.00" stop-color="#AC9377" stop-opacity="0.22"/>
    </linearGradient>

    <!-- Vignette hangat tepi luar (kiri) -->
    <linearGradient id="cl-outer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0.00" stop-color="#C4AE92" stop-opacity="0.22"/>
      <stop offset="0.15" stop-color="#C4AE92" stop-opacity="0"/>
    </linearGradient>

    <!-- Bayangan kain menjelang trim (kanan) -->
    <linearGradient id="cl-seamshade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0.86" stop-color="#C9B18E" stop-opacity="0"/>
      <stop offset="1.00" stop-color="#C9B18E" stop-opacity="0.28"/>
    </linearGradient>

    <!-- Rel gorden: silinder kuningan -->
    <linearGradient id="cl-rod" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.00" stop-color="#8C6D1F"/>
      <stop offset="0.28" stop-color="#D9B843"/>
      <stop offset="0.45" stop-color="#F6E7A8"/>
      <stop offset="0.70" stop-color="#B08A28"/>
      <stop offset="1.00" stop-color="#7A5F1B"/>
    </linearGradient>

    <!-- Ring emas -->
    <linearGradient id="cl-ring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.00" stop-color="#F6E7A8"/>
      <stop offset="0.55" stop-color="#D4AF37"/>
      <stop offset="1.00" stop-color="#B08A28"/>
    </linearGradient>

    <!-- Pita lattice dusty-rose (rantai oktagon seperti foto) -->
    <pattern id="cl-lattice" patternUnits="userSpaceOnUse" width="27" height="27">
      <rect width="27" height="27" fill="#F5E7E3"/>
      <polygon points="21.8,16.9 16.9,21.8 10.1,21.8 5.2,16.9 5.2,10.1 10.1,5.2 16.9,5.2 21.8,10.1"
               fill="none" stroke="#D8A7B1" stroke-width="1.8"/>
      <path d="M13.5,-4 L17.5,0 L13.5,4 L9.5,0 Z" fill="none" stroke="#D8A7B1" stroke-width="1.4"/>
      <path d="M13.5,23 L17.5,27 L13.5,31 L9.5,27 Z" fill="none" stroke="#D8A7B1" stroke-width="1.4"/>
      <circle cx="13.5" cy="13.5" r="1.6" fill="#B8848F"/>
    </pattern>

    <!-- Serat linen: noise dipanjangkan vertikal = benang tenun -->
    <filter id="cl-threads" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.22 0.004" numOctaves="2" seed="11"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>

    <!-- Grain halus anti-banding -->
    <filter id="cl-grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="2" seed="3"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
  </defs>

  <!-- Strip "dinding" di belakang rel, supaya area atas tetap tertutup -->
  <rect x="0" y="0" width="500" height="46" fill="#FFFDFB"/>

  <!-- Kain -->
  <rect x="0" y="40" width="500" height="960" fill="url(#cl-pleats)"/>
  <rect x="0" y="40" width="500" height="8" fill="#F3ECE1" opacity="0.9"/>
  <rect x="0" y="40" width="500" height="960" filter="url(#cl-threads)" opacity="0.14" style="mix-blend-mode:soft-light"/>
  <rect x="0" y="40" width="500" height="960" filter="url(#cl-grain)" opacity="0.04" style="mix-blend-mode:soft-light"/>
  <rect x="0" y="40" width="500" height="960" fill="url(#cl-vsheen)"/>
  <rect x="0" y="40" width="500" height="960" fill="url(#cl-outer)"/>
  <rect x="0" y="40" width="500" height="960" fill="url(#cl-seamshade)"/>

  <!-- Kerutan pinch-pleat di header: satu kerutan per puncak lipatan -->
  <g stroke-linecap="round" fill="none">
    <g stroke="#FFFEFD" stroke-width="3" opacity="0.9">
      <path d="M20,50 L20,124"/><path d="M68,50 L68,124"/><path d="M118.5,50 L118.5,124"/>
      <path d="M169,50 L169,124"/><path d="M222,50 L222,124"/><path d="M270,50 L270,124"/>
      <path d="M318,50 L318,124"/><path d="M369.5,50 L369.5,124"/><path d="M418.5,50 L418.5,124"/>
      <path d="M469,50 L469,124"/>
    </g>
    <g stroke="#E0D2BE" stroke-width="2" opacity="0.75">
      <path d="M20,46 C14,78 8,104 2,130"/><path d="M20,46 C26,78 32,104 38,130"/>
      <path d="M68,46 C62,78 56,104 50,130"/><path d="M68,46 C74,78 80,104 86,130"/>
      <path d="M118.5,46 C112.5,78 106.5,104 100.5,130"/><path d="M118.5,46 C124.5,78 130.5,104 136.5,130"/>
      <path d="M169,46 C163,78 157,104 151,130"/><path d="M169,46 C175,78 181,104 187,130"/>
      <path d="M222,46 C216,78 210,104 204,130"/><path d="M222,46 C228,78 234,104 240,130"/>
      <path d="M270,46 C264,78 258,104 252,130"/><path d="M270,46 C276,78 282,104 288,130"/>
      <path d="M318,46 C312,78 306,104 300,130"/><path d="M318,46 C324,78 330,104 336,130"/>
      <path d="M369.5,46 C363.5,78 357.5,104 351.5,130"/><path d="M369.5,46 C375.5,78 381.5,104 387.5,130"/>
      <path d="M418.5,46 C412.5,78 406.5,104 400.5,130"/><path d="M418.5,46 C424.5,78 430.5,104 436.5,130"/>
      <path d="M469,46 C463,78 457,104 451,130"/><path d="M469,46 C475,78 481,104 487,130"/>
    </g>
  </g>

  <!-- Rel kuningan + ring di setiap kerutan (melewati tepi panel supaya
       tersambung mulus dengan panel sebelah di seam tengah) -->
  <rect x="-12" y="12" width="524" height="11" rx="5.5" fill="url(#cl-rod)"/>
  <g stroke="url(#cl-ring)" stroke-width="3.5" fill="none">
    <circle cx="20" cy="31" r="9"/><circle cx="68" cy="31" r="9"/><circle cx="118.5" cy="31" r="9"/>
    <circle cx="169" cy="31" r="9"/><circle cx="222" cy="31" r="9"/><circle cx="270" cy="31" r="9"/>
    <circle cx="318" cy="31" r="9"/><circle cx="369.5" cy="31" r="9"/><circle cx="418.5" cy="31" r="9"/>
    <circle cx="469" cy="31" r="9"/>
  </g>
  <g stroke="#B08A28" stroke-width="2">
    <path d="M20,40 L20,47"/><path d="M68,40 L68,47"/><path d="M118.5,40 L118.5,47"/>
    <path d="M169,40 L169,47"/><path d="M222,40 L222,47"/><path d="M270,40 L270,47"/>
    <path d="M318,40 L318,47"/><path d="M369.5,40 L369.5,47"/><path d="M418.5,40 L418.5,47"/>
    <path d="M469,40 L469,47"/>
  </g>

  <!-- Tepi dalam: bayangan crease -> hairline gold -> pita lattice rose -> strip ivory -->
  <rect x="461" y="40" width="1.5" height="960" fill="#D4AF37" opacity="0.8"/>
  <rect x="462.5" y="40" width="3" height="960" fill="#FFFDFB"/>
  <rect x="465.5" y="40" width="27" height="960" fill="url(#cl-lattice)"/>
  <rect x="465.5" y="40" width="27" height="960" fill="url(#cl-vsheen)"/>
  <rect x="492.5" y="40" width="1" height="960" fill="#E0D2BE"/>
  <rect x="493.5" y="40" width="6.5" height="960" fill="#FFFDFB"/>
  <rect x="499" y="40" width="1" height="960" fill="#E8D4A0" opacity="0.7"/>

  <!-- Filigree champagne di sudut kiri-bawah (identitas lama dipertahankan) -->
  <g stroke="#D4AF37" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.8">
    <path d="M30,970 C110,978 150,960 180,930"/>
    <path d="M30,970 C22,890 40,850 70,820"/>
    <circle cx="150" cy="938" r="4" fill="#E8D4A0" stroke="none"/>
  </g>
</svg>
