<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Mawar rose/blush tampak atas, v2 "lebih hidup" —
       struktur sama dengan bloom-a (kelopak bezier 3 ring),
       palet rose #D8A7B1 / #C98F9B / #B8848F. -->
  <defs>
    <radialGradient id="bb-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#E9C4CA" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#F1D8DB" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#F6E5E6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bb-depth" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#A56E7B"/>
      <stop offset="26%" stop-color="#C08894"/>
      <stop offset="56%" stop-color="#E4BFC7"/>
      <stop offset="100%" stop-color="#FDF7F6"/>
    </radialGradient>
    <radialGradient id="bb-core" cx="50%" cy="44%" r="66%">
      <stop offset="0%"  stop-color="#BE8490"/>
      <stop offset="100%" stop-color="#9C6873"/>
    </radialGradient>
    <path id="bb-p1" d="M60 66 C44 60 37 44 40 26 C43 12 51 6 60 6
                        C69 6 77 12 80 26 C83 44 76 60 60 66 Z"/>
    <path id="bb-p2" d="M60 64 C49 59 44 47 46 33 C48 22 53 17 60 17
                        C67 17 72 22 74 33 C76 47 71 59 60 64 Z"/>
    <path id="bb-p3" d="M60 62 C52.5 58 49 49 50.5 39 C52 31 55 27.5 60 27.5
                        C65 27.5 68 31 69.5 39 C71 49 67.5 58 60 62 Z"/>
  </defs>

  <circle cx="60" cy="60" r="58" fill="url(#bb-halo)"/>

  <!-- ring luar: 9 kelopak -->
  <g fill="url(#bb-depth)" stroke="#B07E8A" stroke-width="0.8" stroke-opacity="0.3">
    <use href="#bb-p1" transform="rotate(11 60 60)"/>
    <use href="#bb-p1" transform="rotate(50 60 60)"/>
    <use href="#bb-p1" transform="rotate(87 60 60)"/>
    <use href="#bb-p1" transform="rotate(129 60 60)"/>
    <use href="#bb-p1" transform="rotate(166 60 60)"/>
    <use href="#bb-p1" transform="rotate(210 60 60)"/>
    <use href="#bb-p1" transform="rotate(247 60 60)"/>
    <use href="#bb-p1" transform="rotate(289 60 60)"/>
    <use href="#bb-p1" transform="rotate(330 60 60)"/>
  </g>

  <!-- ring tengah: 7 kelopak -->
  <g fill="url(#bb-depth)" stroke="#B07E8A" stroke-width="0.8" stroke-opacity="0.38">
    <use href="#bb-p2" transform="rotate(26 60 60)"/>
    <use href="#bb-p2" transform="rotate(78 60 60)"/>
    <use href="#bb-p2" transform="rotate(130 60 60)"/>
    <use href="#bb-p2" transform="rotate(180 60 60)"/>
    <use href="#bb-p2" transform="rotate(232 60 60)"/>
    <use href="#bb-p2" transform="rotate(282 60 60)"/>
    <use href="#bb-p2" transform="rotate(334 60 60)"/>
  </g>

  <!-- ring dalam: 5 kelopak -->
  <g fill="url(#bb-depth)" stroke="#B07E8A" stroke-width="0.8" stroke-opacity="0.45">
    <use href="#bb-p3" transform="rotate(48 60 60)"/>
    <use href="#bb-p3" transform="rotate(120 60 60)"/>
    <use href="#bb-p3" transform="rotate(192 60 60)"/>
    <use href="#bb-p3" transform="rotate(264 60 60)"/>
    <use href="#bb-p3" transform="rotate(336 60 60)"/>
  </g>

  <!-- gulungan tengah -->
  <circle cx="60" cy="60" r="10.5" fill="url(#bb-core)"/>
  <g fill="none" stroke="#845560" stroke-width="1.5" stroke-linecap="round" opacity="0.6">
    <path d="M60 51.5 a8.5 8.5 0 1 1 -8.5 8.5"/>
    <path d="M60 55 a5 5 0 1 0 5 5"/>
    <path d="M60 57.8 a2.4 2.4 0 1 1 -2.4 2.4"/>
  </g>
</svg>
