<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900" fill="none">
  <defs>
    <!-- 4-point sparkle as a reusable shape -->
    <g id="spk">
      <path d="M0,-12 C1.5,-3 3,-1.5 12,0 C3,1.5 1.5,3 0,12 C-1.5,3 -3,1.5 -12,0 C-3,-1.5 -1.5,-3 0,-12 Z"/>
    </g>
  </defs>

  <g fill="#E8D4A0">
    <use href="#spk" transform="translate(120,150) scale(1.3)"/>
    <use href="#spk" transform="translate(470,210) scale(1.6)"/>
    <use href="#spk" transform="translate(300,110) scale(1.0)"/>
    <use href="#spk" transform="translate(520,430) scale(1.1)"/>
    <use href="#spk" transform="translate(90,360) scale(0.9)"/>
  </g>
  <g fill="#FFFFFF">
    <use href="#spk" transform="translate(210,260) scale(0.8)"/>
    <use href="#spk" transform="translate(400,330) scale(0.9)"/>
    <use href="#spk" transform="translate(150,520) scale(0.7)"/>
  </g>
  <g fill="#D4AF37" opacity="0.85">
    <circle cx="260" cy="190" r="3"/>
    <circle cx="440" cy="150" r="3"/>
    <circle cx="340" cy="420" r="3"/>
    <circle cx="180" cy="300" r="2.5"/>
    <circle cx="500" cy="320" r="2.5"/>
  </g>
</svg>
